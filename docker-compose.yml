services:
  ollama:
    image: ollama/ollama:latest
    container_name: clinidoc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (uncomment for NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Pull the model on startup
  ollama-pull:
    image: curlimages/curl:latest
    container_name: clinidoc-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2\"}'"
    restart: "no"

  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: clinidoc-hapi-fhir
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    environment:
      - JAVA_OPTS=-Xms1g -Xmx3g
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.allow_multiple_delete=true
    volumes:
      - hapi-data:/data/hapi

  fhir-loader:
    image: curlimages/curl:latest
    container_name: clinidoc-fhir-loader
    depends_on:
      - hapi-fhir
    volumes:
      - ./synthea-data:/synthea-data
      - ./scripts/load_synthea.sh:/load_synthea.sh:ro
    environment:
      - PATIENT_LIMIT=10
    entrypoint: ["/bin/sh", "/load_synthea.sh"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinidoc-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      - FHIR_BASE_URL=http://hapi-fhir:8080/fhir
    depends_on:
      ollama:
        condition: service_healthy
      fhir-loader:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinidoc-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  ollama_data:
  hapi-data:
