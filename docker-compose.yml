services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - FHIR_BASE_URL=http://hapi.fhir.org/baseR4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
